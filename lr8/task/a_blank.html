<title>ТЕГ "a" С АТРИБУТОМ target="_blank"</title>
</head>
<h1>ТЕГ "a" С АТРИБУТОМ target="_blank"</h1>
<p>
Атрибут target="_blank" — это параметр HTML-тега <a>, который указывает браузеру, как открывать ссылку. Когда пользователь кликает по ссылке с этим атрибутом, содержимое открывается в новой вкладке или окне браузера, не закрывая текущую страницу
</p>
</html>
