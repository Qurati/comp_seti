<h1>ТЕГ body</h1>

<p>Тег <body> в HTML — это контейнер для всего видимого содержимого веб-страницы, которое видит пользователь в окне браузера. Внутри <body> находятся текст, изображения, формы, кнопки, таблицы, видео и другие элементы.</p>
