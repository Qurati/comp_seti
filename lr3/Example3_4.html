<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Многоуровневный список</title>
</head>
<body>
    <h1>Разделы курса</h1>
    <ol>
        <li>Теги заголовков
            <!-- Заменяем <ul> на <ol type="a"> и добавляем два пункта -->
            <ol type="a">
                <li>h1</li>
                <li>h2</li>
                <li>h3</li>
                <li>h4</li>
            </ol>
        </li>
        <li>Теги списков
            <ul type="circle">
                <li>Маркированный список</li>
                <li>Нумерованный список</li>
            </ul>
        </li>
        <li>Теги форм</li>
    </ol>
</body>
</html>
