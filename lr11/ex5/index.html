<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ползунок</title>
    <script>
        function sizePic(){
            size = document.getElementById("size").value();
            img = document.getElementById("pic");
            img.width = 60 + 80*size;
        }
    </script>
</head>
<body>
    <p>Размер рисунка: <input type="range" min="1" max="5" id="size" oninput="sizePic()" value="3"></p>
    <p><img src="logo1.gif" alt="pic" width="300"></p>
</body>
</html>
